<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shoe Store{% endblock %}</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="/">👟 Shoe Store</a>

            <div class="ms-auto">
                <a href="{% url 'cart' %}" class="btn btn-outline-light me-2">
                    Cart
                </a>

                {% if user.is_authenticated %}
                <span class="text-white me-2">Hi, {{ user.username }}</span>
                <a href="{% url 'logout' %}" class="btn btn-danger btn-sm">
                    Logout
                </a>
                {% else %}
                <a href="{% url 'login' %}" class="btn btn-success btn-sm">
                    Login
                </a>
                {% endif %}
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        {% block content %}{% endblock %}
    </div>
    <form class="d-flex me-3" method="get" action="/">
        <input class="form-control me-2" type="search" name="q" placeholder="Search shoes...">
        <button class="btn btn-outline-light">Search</button>
    </form>

</body>

</html>
