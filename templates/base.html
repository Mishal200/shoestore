{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Shoe Store{% endblock %}</title>

    <!-- Main Styles -->
    <link rel="stylesheet" href="{% static 'css/style.css' %}">

    <!-- Page Specific Styles -->
    <link rel="stylesheet" href="{% static 'css/cart.css' %}">
    <link rel="stylesheet" href="{% static 'css/order_success.css' %}">
    <link rel="stylesheet" href="{% static 'css/track_order.css' %}">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <link rel="stylesheet" href="{% static 'css/track_order.css' %}">

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap"
          rel="stylesheet">
</head>
<body>

<!-- ================= NAVBAR ================= -->
<nav class="nike-navbar">

    <!-- Logo -->
    <a href="{% url 'home' %}" class="brand">
        SHOE <span>STORE</span>
    </a>

    <!-- Menu -->
    <div class="menu">
        <a href="#">New & Featured</a>
        <a href="#">Men</a>
        <a href="#">Women</a>
        <a href="{% url 'track_order' %}">Track Order</a>
    </div>

    <!-- Right Side -->
    <div class="nav-right">

        <!-- Search -->
        <form method="get" action="{% url 'home' %}" class="search-box">
            <input type="text"
                   name="q"
                   placeholder="Search shoes..."
                   value="{{ request.GET.q }}">
        </form>

        <!-- Wishlist -->
        <a href="{% url 'wishlist' %}" class="icon-btn" title="Wishlist">
            ♡
        </a>

        <!-- Cart -->
        <a href="{% url 'cart' %}" class="icon-btn" title="Shopping Cart">
            🛒
        </a>

        {% if user.is_authenticated %}
            <!-- Username -->
            <span class="user">
                👤 {{ user.username }}
            </span>

            <!-- Logout -->
            <form method="post"
                  action="{% url 'logout' %}"
                  class="logout-form">
                {% csrf_token %}
                <button type="submit" class="logout-btn">
                    Logout
                </button>
            </form>
        {% else %}
            <!-- Login -->
            <a href="{% url 'login' %}" class="login-btn">
                Login
            </a>
        {% endif %}
    </div>

</nav>

<!-- ================= MAIN CONTENT ================= -->
<main class="main-content">
    {% block content %}
    {% endblock %}
</main>

</body>
</html>
